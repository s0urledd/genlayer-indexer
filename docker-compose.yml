services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: genlayer
      POSTGRES_PASSWORD: genlayer
      POSTGRES_DB: genlayer_indexer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
